<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1420"/>
      <stop offset="100%" style="stop-color:#111927"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>
  <!-- Body silhouette -->
  <ellipse cx="200" cy="320" rx="110" ry="85" fill="url(#accentGrad)" opacity="0.85" clip-path="url(#avatarClip)"/>
  <!-- Head silhouette -->
  <circle cx="200" cy="158" r="70" fill="url(#accentGrad)" opacity="0.85"/>
  <!-- Rim -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="url(#accentGrad)" stroke-width="2.5"/>
  <!-- Initials -->
  <text x="200" y="175" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="700" fill="#080c12" opacity="0.9">LS</text>
</svg>
